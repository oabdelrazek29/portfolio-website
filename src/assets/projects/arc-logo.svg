<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" rx="24" fill="#0f0f1a"/>
  <defs>
    <linearGradient id="arc-grad" x1="120" y1="280" x2="280" y2="120">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <filter id="arc-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <path
    d="M120 280 Q200 80 280 280"
    stroke="url(#arc-grad)"
    stroke-width="10"
    stroke-linecap="round"
    fill="none"
    filter="url(#arc-glow)"
  />
  <circle cx="120" cy="280" r="18" fill="#22d3ee"/>
  <circle cx="200" cy="120" r="22" fill="#818cf8"/>
  <circle cx="280" cy="280" r="18" fill="#a78bfa"/>
  <circle cx="155" cy="220" r="10" fill="#67e8f9" opacity="0.9"/>
  <circle cx="245" cy="220" r="10" fill="#c4b5fd" opacity="0.9"/>
  <text x="200" y="340" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" letter-spacing="6">ARC</text>
</svg>
