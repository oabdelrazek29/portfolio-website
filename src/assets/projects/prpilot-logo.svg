<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" rx="24" fill="#0c1222"/>
  <defs>
    <linearGradient id="prpilot-grad" x1="80" y1="120" x2="320" y2="280">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="prpilot-wing" x1="200" y1="60" x2="200" y2="200">
      <stop offset="0%" stop-color="#6ee7b7"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="prpilot-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Pilot wings -->
  <path
    d="M200 72 L248 148 L200 128 L152 148 Z"
    fill="url(#prpilot-wing)"
    opacity="0.95"
    filter="url(#prpilot-glow)"
  />
  <!-- PR document / diff card -->
  <rect x="108" y="156" width="184" height="148" rx="16" fill="#111827" stroke="url(#prpilot-grad)" stroke-width="3"/>
  <text x="200" y="210" text-anchor="middle" fill="url(#prpilot-grad)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="40" font-weight="700">PR</text>
  <!-- Diff lines -->
  <line x1="132" y1="232" x2="268" y2="232" stroke="#34d399" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <line x1="132" y1="252" x2="220" y2="252" stroke="#34d399" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
  <line x1="132" y1="272" x2="248" y2="272" stroke="#f87171" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
  <line x1="132" y1="292" x2="200" y2="292" stroke="#f87171" stroke-width="6" stroke-linecap="round" opacity="0.5"/>
  <text x="200" y="352" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" letter-spacing="2">PRPilot</text>
</svg>
