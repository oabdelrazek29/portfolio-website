<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" rx="24" fill="#120d05"/>
  <defs>
    <linearGradient id="portfolio-grad" x1="100" y1="300" x2="300" y2="100">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="portfolio-face" x1="140" y1="160" x2="260" y2="260">
      <stop offset="0%" stop-color="#fdba74" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.12"/>
    </linearGradient>
    <filter id="portfolio-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Orbit ring (Three.js / space vibe) -->
  <ellipse cx="200" cy="188" rx="118" ry="42" stroke="url(#portfolio-grad)" stroke-width="2.5" opacity="0.45" transform="rotate(-18 200 188)"/>
  <circle cx="318" cy="152" r="6" fill="#fdba74" filter="url(#portfolio-glow)"/>
  <circle cx="88" cy="228" r="4" fill="#f97316" opacity="0.8"/>
  <circle cx="292" cy="248" r="3" fill="#fb923c" opacity="0.7"/>
  <!-- Isometric 3D cube -->
  <g filter="url(#portfolio-glow)">
    <path d="M200 108 L272 152 L272 236 L200 280 L128 236 L128 152 Z" fill="url(#portfolio-face)" stroke="url(#portfolio-grad)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M200 108 L272 152 L200 196 L128 152 Z" fill="#f97316" fill-opacity="0.18" stroke="url(#portfolio-grad)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M272 152 L272 236 L200 280 L200 196 Z" fill="#ea580c" fill-opacity="0.12" stroke="url(#portfolio-grad)" stroke-width="3" stroke-linejoin="round"/>
    <path d="M128 152 L200 196 L200 280 L128 236 Z" fill="#7c2d12" fill-opacity="0.25" stroke="url(#portfolio-grad)" stroke-width="3" stroke-linejoin="round"/>
    <line x1="200" y1="108" x2="200" y2="196" stroke="url(#portfolio-grad)" stroke-width="2.5" opacity="0.7"/>
    <line x1="128" y1="152" x2="200" y2="196" stroke="url(#portfolio-grad)" stroke-width="2.5" opacity="0.7"/>
    <line x1="272" y1="152" x2="200" y2="196" stroke="url(#portfolio-grad)" stroke-width="2.5" opacity="0.7"/>
  </g>
  <!-- Code brackets hint -->
  <text x="148" y="318" fill="#fdba74" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="36" font-weight="700" opacity="0.9">{</text>
  <text x="252" y="318" fill="#fdba74" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="36" font-weight="700" opacity="0.9">}</text>
  <text x="200" y="352" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="600" letter-spacing="1">3D Portfolio</text>
</svg>
