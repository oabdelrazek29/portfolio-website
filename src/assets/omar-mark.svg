<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="oa-bg" x1="8" y1="56" x2="56" y2="8">
      <stop offset="0%" stop-color="#1a1008"/>
      <stop offset="100%" stop-color="#0a0700"/>
    </linearGradient>
    <linearGradient id="oa-stroke" x1="12" y1="52" x2="52" y2="12">
      <stop offset="0%" stop-color="#fdba74"/>
      <stop offset="40%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="oa-fill" x1="22" y1="44" x2="42" y2="20">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#fb923c" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="oa-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#oa-bg)"/>
  <rect
    x="1.25"
    y="1.25"
    width="61.5"
    height="61.5"
    rx="13.75"
    stroke="url(#oa-stroke)"
    stroke-width="1.25"
    stroke-opacity="0.45"
  />
  <!-- O ring -->
  <circle
    cx="32"
    cy="32"
    r="17.5"
    stroke="url(#oa-stroke)"
    stroke-width="3.25"
    fill="url(#oa-fill)"
    filter="url(#oa-glow)"
  />
  <!-- A ligature inside O -->
  <path
    d="M32 19.5 L41.5 44.5 M32 19.5 L22.5 44.5 M26.5 35.5 H37.5"
    stroke="url(#oa-stroke)"
    stroke-width="3.25"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#oa-glow)"
  />
  <!-- Code accent — subtle bracket ticks -->
  <path
    d="M14 28 L17 32 L14 36"
    stroke="#fdba74"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.7"
  />
  <path
    d="M50 28 L47 32 L50 36"
    stroke="#fdba74"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.7"
  />
  <circle cx="32" cy="19" r="2" fill="#fdba74" opacity="0.9"/>
</svg>
